name: Build and Deploy to AKS

# DISABLED on push:main as of 2026-05-20 — Azure is no longer the deploy
# target. Workflow is preserved (rather than deleted) so the historical
# manifests under k8s/*.yaml stay anchored to something runnable, and so
# the workflow can be re-enabled by adding the push trigger back if a new
# Azure-based deploy story emerges. ADRs 0008 (AKS deploy) and 0009
# (in-cluster Postgres) explain the original setup; docs/product-vision.md
# frames the current "cloud infra is dormant" stance and notes Phase 6 as
# the natural time to revisit. `workflow_dispatch:` left enabled so the
# job can still be run manually if needed (but it'll fail until the
# AZURE_CREDENTIALS / FLASK_SECRET_KEY repository secrets are populated).
on:
  workflow_dispatch:

env:
  TLD: darwinist.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/heads/fusion') && 'fusion' || '' }}
    steps:
    - name: Install jq and envsubst (fast)
      run: |
        # Install jq
        if ! command -v jq > /dev/null; then
          curl -L -o jq https://github.com/stedolan/jq/releases/download/jq-1.7.1/jq-linux64
          chmod +x jq
          sudo mv jq /usr/local/bin/
        fi
        # Install envsubst (from gettext)
        if ! command -v envsubst > /dev/null; then
          curl -L -o envsubst https://github.com/a8m/envsubst/releases/download/v1.4.2/envsubst-linux-amd64
          chmod +x envsubst
          sudo mv envsubst /usr/local/bin/
        fi

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set environment variables
      id: vars
      run: |
        {
          echo "SHORT_SHA=${GITHUB_SHA::8}"
          echo "NAMESPACE=cqc"
          echo "SERVICE_NAME=${GITHUB_REPOSITORY##*/}"
          echo "BUILD_IMAGE=${{ secrets.AKS_RESOURCE_GROUP }}.azurecr.io/${GITHUB_REPOSITORY##*/}:${GITHUB_SHA::8}"
          echo "HOSTNAME=${GITHUB_REF##*/}.${TLD}"
          echo "CERT_NAME=wildcard-${TLD//./-}"
          echo "VIEWER_DOMAIN=${{ secrets.VIEWER_DOMAIN }}"
        } >> "$GITHUB_ENV"

    - name: Show environment
      run: |
        echo ${{ env.CONTAINER_REGISTRY }} | sed 's/./& /g'
        echo ${{ env.BUILD_IMAGE }} | sed 's/./& /g'

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Login to Azure Container Registry
      run: |
        az acr login --name ${{ secrets.AKS_RESOURCE_GROUP }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.BUILD_IMAGE }}
        build-args: |
          GITHUB_SHA=${GITHUB_SHA}
          GITHUB_REF=${GITHUB_REF}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Set AKS context
      run: |
        az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_RESOURCE_GROUP }} --admin

    - name: Deploy to AKS
      env:
        IMAGE_TAG: ${{ env.IMAGE_TAG }}
        NAMESPACE: ${{ env.NAMESPACE }}
        SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
      run: |
        if [ -z "$SECRET_KEY" ]; then
          echo "::error::FLASK_SECRET_KEY repository secret is not set."
          echo "Generate one with: python -c 'import secrets; print(secrets.token_urlsafe(64))'"
          echo "Then add it under Settings → Secrets and variables → Actions."
          exit 1
        fi
        kubectl get nodes
        envsubst < k8s/namespace.yaml | kubectl apply -f -

        kubectl get configmap application-environment-variables -n default -o json \
          | jq 'del(.metadata.namespace, .metadata.creationTimestamp, .metadata.resourceVersion, .metadata.selfLink, .metadata.uid, .metadata.annotations, .metadata.managedFields)' \
          | kubectl apply -n "$NAMESPACE" -f -
        envsubst < k8s/namespace.yaml | kubectl apply -f -
        # SECRET_KEY (Flask session signing) lands as a per-service Secret before the
        # Deployment references it via secretKeyRef in k8s/deployment.yaml.
        envsubst < k8s/secret.yaml | kubectl apply -n "$NAMESPACE" -f -
        envsubst < k8s/deployment.yaml | kubectl apply -n "$NAMESPACE" -f -
        envsubst < k8s/service.yaml | kubectl apply -n "$NAMESPACE" -f -
        envsubst < k8s/ingress.yaml | kubectl apply -n "$NAMESPACE" -f -
        # Copy SSL certs from default namespace if needed
        kubectl get secret "$CERT_NAME" -o json \
          | jq 'del(.metadata["namespace","creationTimestamp","resourceVersion","selfLink","uid"])' \
          | kubectl apply -n "$NAMESPACE" -f -
        kubectl rollout status "deployment/$SERVICE_NAME" -n "$NAMESPACE"